<!DOCTYPE html>
<html lang="en" 
    xmlns:th="http://www.thymeleaf.org" 
    xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1 class="mb-4" th:text="${library.name}">Library Name</h1>

                <dl class="row">
                    <dt class="col-sm-3">Type</dt>
                    <dd class="col-sm-9" th:text="${library.type} ? ${library.type.typeName} : 'Other'"></dd>

                    <dt class="col-sm-3">Location</dt>
                    <dd class="col-sm-9" th:text="${library.location ?: '-'}"></dd>

                    <dt class="col-sm-3">Website</dt>
                    <dd class="col-sm-9">
                        <a th:if="${library.www != null}" th:href="${library.www}" th:text="${library.www}" target="_blank"></a>
                        <span th:if="${library.www == null}">-</span>
                    </dd>

                    <dt class="col-sm-3">Institution</dt>
                    <dd class="col-sm-9" th:text="${library.institution} ? ${library.institution.name} : 'Independent'"></dd>

                    <dt class="col-sm-3">Amenities</dt>
                    <dd class="col-sm-9" th:text="${library.amenities ?: '-'}"></dd>

                    <dt class="col-sm-3">Added to database</dt>
                    <dd class="col-sm-9" th:text="${#temporals.format(library.createdAt, 'dd MMM yyyy HH:mm')}"></dd>
                </dl>

                <hr class="my-4">

                <h4 class="mb-3">Comments</h4>
                <a th:href="@{/post/new(libraryId=${library.id})}" class="btn btn-primary mb-3">Add a Comment</a>
                <div th:if="${library.posts == null or library.posts.isEmpty()}">
                    <p class="text-muted">No comments yet for this library.</p>
                </div>
                <div class="card mb-3" th:each="post : ${library.posts}">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${post.title}"></h5>
                        <p class="card-text" th:text="${post.body}"></p>
                        <!-- TODO add rating display 0-10 integer to 5 stars -->
                        <small class="text-muted">
                            By <span th:text="${post.user.username}"></span> &middot;
                            Rating: <span th:text="${post.rating ?: 'N/A'}"></span> &middot;
                            <span th:text="${#temporals.format(post.createdAt, 'dd MMM yyyy HH:mm')}"></span>
                        </small>
                    </div>
                </div>

                <div class="mt-3">
                    <a th:href="@{/library/{id}/edit(id=${library.id})}" class="btn btn-primary">Edit</a>
                    <a th:href="@{/library/list}" class="btn btn-secondary">Back to list</a>
                </div>
            </div>
        </div>
    </div>
</body>
</body>
</html>
