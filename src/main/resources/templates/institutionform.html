<!DOCTYPE html>
<html lang="en" 
    xmlns:th="http://www.thymeleaf.org" 
    xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1 class="mb-4">Institution Form</h1>
                <form th:action="@{/institution/save}" th:object="${institution}" method="post">
                    <!-- hidden field to carry returnTo through the POST -->
                    <input type="hidden" name="returnTo" th:value="${returnTo}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Institution Name</label>
                        <input type="text" class="form-control" id="name" th:field="*{name}" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a th:href="@{/institution/list}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
