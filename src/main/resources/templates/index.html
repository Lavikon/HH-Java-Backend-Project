<!DOCTYPE html>
<html lang="en" 
    xmlns:th="http://www.thymeleaf.org" 
    xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Little Library Index</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">

        <!-- Header -->
        <div class="row mb-4">
            <div class="col">
                <h1>Little Free Library</h1>
                <p class="text-muted">Find and share little free libraries near you.</p>
            </div>
            <div class="col-auto">
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn btn-primary me-2">Login</a>
                    <a th:href="@{/user/new}" class="btn btn-secondary">Register</a>
                </div>
                <div th:if="${param.logout}" class="alert alert-info">
                    You have been logged out.
                </div>
                <div sec:authorize="isAuthenticated()">
                    <span class="me-3">Welcome, <span sec:authentication="name"></span></span>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-secondary">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
