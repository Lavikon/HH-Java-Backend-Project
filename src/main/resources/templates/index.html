<!DOCTYPE html>
<html lang="en" 
    xmlns:th="http://www.thymeleaf.org" 
    xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Little Library Index</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">

        <!-- Header -->
        <div class="row mb-4">
            <div class="col">
                <h1>Little Free Library</h1>
                <p class="text-muted">Find and share little free libraries near you.</p>
            </div>
            <div class="col-auto">
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn btn-primary me-2">Login</a>
                    <a th:href="@{/user/new}" class="btn btn-secondary">Register</a>
                </div>
                <div th:if="${param.logout}" class="alert alert-info">
                    You have been logged out.
                </div>
                <div sec:authorize="isAuthenticated()">
                    <span class="me-3">Welcome, <span sec:authentication="name"></span></span>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-secondary">Logout</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Main content -->
        <div class="row">

            <!-- Recent comments -->
            <div class="col-md-4">
                <h4 class="mb-3">Recent Comments</h4>
                <div th:if="${recentPosts == null or recentPosts.isEmpty()}" class="text-muted">
                    No comments yet.
                </div>
                <div class="card mb-3" th:each="post : ${recentPosts}">
                    <div class="card-body">
                        <h6 class="card-title" th:text="${post.title}"></h6>
                        <p class="card-text small text-muted" th:text="${post.body}"></p>
                        <div class="d-flex justify-content-between align-items-center">
                            <small class="text-muted">
                                <span th:text="${post.user.username}"></span> &middot;
                                <a th:href="@{/library/{id}(id=${post.library.id})}"
                                   th:text="${post.library.name}"></a>
                            </small>
                            <small th:text="${post.rating}"></small>
                        </div>
                    </div>
                </div>

        </div> <!-- End of main content row -->
    </div>
</body>

</html>
