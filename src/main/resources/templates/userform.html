<!DOCTYPE html>
<html lang="en" 
    xmlns:th="http://www.thymeleaf.org" 
    xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1 class="mb-4">User Form</h1>
                <form th:action="@{/user/save}" th:object="${appUser}" method="post">
                    <input type="hidden" th:if="${appUser.id != null}" th:field="*{id}" />

                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" th:field="*{username}" required />
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" th:field="*{email}" required />
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" th:field="*{password}" required />
                    </div>

                    <!-- TODO: limit role options for authenticated users -->
                    <div class="mb-3">
                        <span sec:authorize="hasAuthority('ADMIN')">
                        <label for="role" class="form-label">Role</label>
                        <select class="form-select" id="role" th:field="*{role}">
                            <option value="USER" th:selected="*{role} == 'USER'">User</option>
                            <option value="MOD" th:selected="*{role} == 'MOD'">Moderator</option>
                            <option value="ADMIN" th:selected="*{role} == 'ADMIN'">Administrator</option>
                        </select>
                        </span>
                    </div>

                    <button type="submit" class="btn btn-primary">Save</button>
                    <a th:href="@{/user/list}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
