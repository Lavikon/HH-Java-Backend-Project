<!DOCTYPE html>
<html lang="en" 
    xmlns:th="http://www.thymeleaf.org" 
    xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>User Form</h1>
    <form th:action="@{/users/save}" th:object="${appUser}" method="post">
        <input type="hidden" th:if="${appUser.id != null}"th:field="*{id}" />
        
        <label for="username">Username:</label>
        <input type="text" th:field="*{username}" id="username" required />
        
        <label for="email">Email:</label>
        <input type="email" th:field="*{email}" id="email" required />
        
        <label for="password">Password:</label>
        <input type="password" th:field="*{password}" id="password" required />
        
        <!-- TODO: limit role options for authenticated users -->
        <label for="role">Role:</label>
        <select th:field="*{role}" id="role">
            <option value="USER">User</option>
            <option value="MOD">Moderator</option>
            <option value="ADMIN">Administrator</option>
        </select>
        
        <button type="submit">Save</button>
        <a th:href="@{/users/list}">Cancel</a>
    </form>
</body>
</html>
