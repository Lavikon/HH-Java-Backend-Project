<!DOCTYPE html>
<html lang="en" 
    xmlns:th="http://www.thymeleaf.org" 
    xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Libraries</h1>
        <div>
        <!-- Username display -->
            Logged in as: <b><span sec:authentication="name"></span></b>
        </div>
        <!-- Logout  -->
        <div>
            <form th:action="@{/logout}" method="post">
                <input type="submit" value="Sign Out" class="btn btn-sm btn-danger" />
            </form>
        </div>

        <a href="/library/new" class="btn btn-primary mb-3">Add New Library</a>
        <a href="/institution/new" class="btn btn-secondary mb-3">Add New Institution</a>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Location</th>
                    <th>Type</th>
                    <th>Institution</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="library : ${libraries}">
                    <td th:text="${library.name}"></td>
                    <td th:text="${library.location}"></td>
                    <td th:text="${library.type} ? ${library.type.typeName} : 'Other'"></td>
                    <td th:text="${library.institution} ? ${library.institution.name} : 'Independent'"></td>
                    <td>
                        <!-- TODO add security visibility for actions -->
                        <a th:href="@{/library/{id}(id=${library.id})}" class="btn btn-sm btn-info">View</a>
                        <span sec:authorize="hasAuthority('ADMIN')">
                            <a th:href="@{/library/{id}/edit(id=${library.id})}" class="btn btn-sm btn-warning">Edit</a>
                            <a th:href="@{/library/{id}/delete(id=${library.id})}" class="btn btn-sm btn-danger">Delete</a>
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
